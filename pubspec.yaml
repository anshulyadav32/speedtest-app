name: netspeed
description: A high-fidelity speedtest replication in Flutter.
publish_to: 'none'
version: 2.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  http: ^1.6.0
  flutter_svg: ^2.0.7
  provider: ^6.1.1
  intl: ^0.19.0
  device_info_plus: ^13.0.0
  network_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0B0B1A"
    theme_color: "#00E5FF"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
