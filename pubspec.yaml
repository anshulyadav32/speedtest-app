name: speedtest
description: NET Speed Test - measure your internet download, upload speed and ping.
version: 1.0.0+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  animations: ^2.0.11
  syncfusion_flutter_core: ^31.1.22
  syncfusion_flutter_gauges: ^31.1.22
  url_launcher: ^6.3.1
  http: ^1.2.0
  permission_handler: ^12.0.0+1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/
