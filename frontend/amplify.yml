version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          if [ ! -f flutter/bin/flutter ]; then
            rm -rf flutter
            git clone https://github.com/flutter/flutter.git -b stable --depth 1
          fi
        - export PATH="$PWD/flutter/bin:$PATH"
        - flutter --version
        - flutter pub get
    build:
      commands:
        - export PATH="$PWD/flutter/bin:$PATH"
        - flutter build web --release
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - flutter/**/*
      - .pub-cache/**/*
